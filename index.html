<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="2;url=https://portfolio.anna-zhang.com/">
  <title>Redirecting to Anna Zhang's Portfolio</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #fff;
      color: #222;
    }
    .redirect-message {
      text-align: center;
    }
    h1 {
      font-size: 1rem;
      font-weight: normal;
      margin: 0 0 1rem 0;
    }
    a {
      color: #0055cc;
      text-decoration: underline;
    }
    a:hover,
    a:focus {
      color: #003d99;
    }
    a:focus {
      outline: 2px solid #0055cc;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <main role="main" aria-labelledby="redirect-heading">
    <div class="redirect-message" aria-live="polite">
      <h1 id="redirect-heading">Redirecting to new site...</h1>
      <p>If you are not redirected automatically, visit <a href="https://portfolio.anna-zhang.com/">portfolio.anna-zhang.com</a></p>
    </div>
  </main>
  <script>
    setTimeout(function() {
      window.location.href = "https://portfolio.anna-zhang.com/";
    }, 2000);
  </script>
</body>
</html>
